<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<!-- 微信分享卡片专用配置（解决截断问题） -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://521nqx.xyz/">
<meta property="og:title" content="A涅槃重生小王的聊天记录">
<meta property="og:description" content="A涅槃重生小王: 08-16-38-24各10米
-14-42-06-28各20米
-18-32-26-04-36各35米
-12-34-22各100米">
<meta property="og:image" content="https://521nqx.xyz/avatar.jpg">
<meta name="description" content="A涅槃重生小王: 08-16-38-24各10米
-14-42-06-28各20米
-18-32-26-04-36各35米
-12-34-22各100米">
<meta name="format-detection" content="telephone=no">
<title>聊天记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font:17px/1.8 -apple-system,PingFang SC,sans-serif;background:#fff}
/* 状态栏 */
.status-bar{height:44px;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 28px}
/* 导航栏 */
.nav-bar{height:44px;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 14px;border-bottom:.5px solid #e8e8e8}
.nav-title{text-align:center;flex:1}
.nav-title h1{font-size:18px;font-weight:600;color:#111}
.nav-title p{font-size:14px;color:#888;margin-top:1px}
/* 聊天内容 */
.chat-content{height:calc(100vh - 88px);padding:16px 12px}
.message-item{display:flex;align-items:flex-start}
.avatar{width:42px;height:42px;border-radius:4px;margin-right:10px;object-fit:cover}
.message-box{flex:1;max-width:80%}
.message-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;font-size:13px;color:#888}
.message-time{color:#b0b0b0}
.message-text{padding-bottom:16px;border-bottom:.5px solid #f0f0f0;font-size:18px;color:#111;white-space:pre-line}
/* 图标样式 */
.icon{width:24px;height:24px;fill:#333}
.status-right{display:flex;align-items:center;gap:5px;font-size:12px;color:#333}
/* 加载失败兜底 */
.loading{display:flex;justify-content:center;align-items:center;height:100vh;font-size:14px;color:#888}
</style>
</head>
<body>
<div class="loading">加载中...</div>

<script>
// 加载配置文件
fetch('config.json')
  .then(res => {
    if(!res.ok) throw new Error('配置加载失败');
    return res.json();
  })
  .then(config => {
    // 更新页面标题
    document.title = config.pageTitle;
    
    // 更新分享卡片
    document.querySelector('meta[property="og:title"]').content = config.shareTitle;
    document.querySelector('meta[property="og:description"]').content = config.shareDesc;
    document.querySelector('meta[name="description"]').content = config.shareDesc;
    document.querySelector('meta[property="og:image"]').content = config.avatarUrl;
    document.querySelector('meta[property="og:url"]').content = config.siteUrl;
    
    // 渲染完整页面
    document.body.innerHTML = `
<div class="status-bar">
<span>${config.statusTime}</span>
<div class="status-right">
<span>${config.speed}</span><span>KB/s</span><span>HD</span>
<svg class="icon" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 21.5L23.6 7c-.4-.3-4.9-4-11.6-4C5.3 3 .8 6.7.4 7L12 21.5z"/></svg>
<span>${config.battery}%</span>
<svg class="icon" viewBox="0 0 24 24"><path d="M15.7 4H14V2h-4v2H8.3C7.6 4 7 4.6 7 5.3v15.4c0 .7.6 1.3 1.3 1.3h7.4c.7 0 1.3-.6 1.3-1.3V5.3C17 4.6 16.4 4 15.7 4z"/></svg>
</div>
</div>
<div class="nav-bar">
<svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z"/></svg>
<div class="nav-title"><h1>${config.chatTitle}</h1><p>${config.chatDate}</p></div>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
</div>
<div class="chat-content">
<div class="message-item">
<img class="avatar" src="${config.avatarUrl}" alt="头像">
<div class="message-box">
<div class="message-header"><span>${config.nickname}</span><span class="message-time">${config.msgTime}</span></div>
<div class="message-text">${config.msgContent}</div>
</div>
</div>
</div>
    `;
  })
  .catch(() => {
    // 兜底渲染（配置加载失败也能正常显示）
    document.body.innerHTML = `
<div class="status-bar">
<span>22:30</span>
<div class="status-right">
<span>536</span><span>KB/s</span><span>HD</span>
<svg class="icon" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 21.5L23.6 7c-.4-.3-4.9-4-11.6-4C5.3 3 .8 6.7.4 7L12 21.5z"/></svg>
<span>68%</span>
<svg class="icon" viewBox="0 0 24 24"><path d="M15.7 4H14V2h-4v2H8.3C7.6 4 7 4.6 7 5.3v15.4c0 .7.6 1.3 1.3 1.3h7.4c.7 0 1.3-.6 1.3-1.3V5.3C17 4.6 16.4 4 15.7 4z"/></svg>
</div>
</div>
<div class="nav-bar">
<svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z"/></svg>
<div class="nav-title"><h1>A涅槃重生小王的聊天记录</h1><p>2026年4月27日</p></div>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
</div>
<div class="chat-content">
<div class="message-item">
<img class="avatar" src="avatar.jpg" alt="头像">
<div class="message-box">
<div class="message-header"><span>A涅槃重生小王</span><span class="message-time">22:22:27</span></div>
<div class="message-text">08-16-38-24各10米
-14-42-06-28各20米
-18-32-26-04-36各35米
-12-34-22各100米</div>
</div>
</div>
</div>
    `;
  });
</script>
</body>
</html>
