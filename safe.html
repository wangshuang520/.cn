<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Helvetica Neue", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 12px;
            font-size: 20px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .loading {
            width: 30px;
            height: 30px;
            border: 3px solid #f0f0f0;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 12px 36px;
            background: #007aff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            border: none;
        }
        .btn:hover {
            background: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading"></div>
        <h2>正在跳转到目标页面</h2>
        <p>如果没有自动跳转，请点击下方按钮</p>
        <button class="btn" onclick="window.location.href='https://521nqx.xyz'">
            立即访问
        </button>
    </div>

    <!-- 自动跳转代码，延迟1秒执行，避免被微信拦截 -->
    <script>
        window.onload = function() {
            setTimeout(function() {
                window.location.href = 'https://521nqx.xyz';
            }, 1000);
        }
    </script>
</body>
</html>
